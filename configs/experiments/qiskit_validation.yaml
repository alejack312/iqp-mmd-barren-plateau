# configs/experiments/qiskit_validation.yaml
# Week 5: Qiskit circuit-level validation
# Compare: exact classical vs statevector vs shot-based vs noisy

experiment:
  name: qiskit_validation
  description: "Cross-check classical IQP estimator against Qiskit statevector and shot-based simulation"
  seed: 42
  output_dir: results/qiskit_validation/
  log_level: INFO

circuit:
  # Restrict to families and sizes feasible for Qiskit statevector
  family: [bounded_degree, lattice]   # 2 regimes: one expected trainable, one BP
  n_qubits: [8, 10, 12, 14, 16, 20]  # statevector feasible
  n_generators: "n"
  bounded_degree:
    max_weight: 3
    max_degree: 4
  lattice:
    dimension: 1
    range: 1

kernel:
  type: gaussian
  bandwidth: [1.0]   # single bandwidth for validation
  polynomial:
    degree: 2
    constant: 1.0

init:
  scheme: uniform
  uniform:
    low: -3.14159265
    high: 3.14159265

dataset:
  type: product_bernoulli
  n_samples: 1000

estimation:
  num_a_samples: 256
  num_z_samples: 512
  num_seeds: 30
  use_jax: true
  batch_size: 5

qiskit:
  backend: aer_simulator
  n_shots: [1000, 10000, 100000]
  max_n: 20
  noise:
    enabled: true
    model: combined    # depolarizing + readout
    error_rate: [0.0, 0.001, 0.005, 0.01]

output:
  format: jsonl
  save_raw: true      # save raw gradient samples for shot-noise analysis
  figures:
    enabled: true
    format: pdf
    dpi: 150
