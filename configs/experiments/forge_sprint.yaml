# configs/experiments/forge_sprint.yaml
# Week 7: Forge structural modeling sprint
# Goal: find minimal plateau-inducing overlap patterns and structural invariants

experiment:
  name: forge_sprint
  description: "Forge structural search for plateau-inducing hypergraph configurations"
  seed: 42
  output_dir: results/forge_sprint/
  log_level: INFO

circuit:
  # Small n only - Forge finite-model finding
  # Search for plateau-inducing patterns across primary connectivity families
  family: [product_state, lattice, erdos_renyi, complete_graph]
  n_qubits: [4, 9, 16, 25, 36, 49, 64, 81, 100, 121, 144, 169, 196, 225, 256, 289, 324, 361, 400, 441, 484, 529, 576, 625, 676, 729, 784, 841, 900, 961, 1024]
  n_generators: "n"   # ignored for product_state, exact 2D lattice, sparse erdos_renyi, and complete_graph
  lattice:
    dimension: 2
    range: 1
  erdos_renyi:
    p_edge: [2.0, 4.0]

kernel:
  type: gaussian
  bandwidth: [1.0]

init:
  scheme: uniform
  uniform:
    low: -3.14159265
    high: 3.14159265

dataset:
  type: product_bernoulli
  n_samples: 1000

estimation:
  num_a_samples: 128
  num_z_samples: 256
  num_seeds: 20
  use_jax: false    # small n: exact computation preferred
  batch_size: 4

forge:
  max_n: 12
  target_property: overlap_threshold   # find min n where generator overlap > threshold
  timeout_sec: 120
  export_instances: true   # serialize found instances to forge/runs/

output:
  format: jsonl
  save_raw: true
  figures:
    enabled: false   # figures generated separately in notebooks
